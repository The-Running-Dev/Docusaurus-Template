# ====================================================================
# RELEASE WORKFLOW
# ====================================================================
#
# Purpose: Automated production deployment workflow that builds and publishes
#          Docusaurus documentation site to GitHub Pages when code is pushed
#          to the main branch.
#
# This workflow is responsible for:
# - Building production-ready Docusaurus site with optimizations
# - Building and publishing the docs-template Docker image to GitHub Container Registry
# - Creating build artifacts for Pages deployment
# - Uploading GitHub Pages artifacts
# - Deploying the built site to GitHub Pages
# - Providing a consistent build environment through the shared build-agent image
#
# ====================================================================
# TRIGGERS
# ====================================================================
#
# This workflow runs on:
# 1. PULL REQUESTS TO MAIN: Build validation before merge
# 2. PUSH TO MAIN BRANCH: Automatic deployment when code is merged to main
# 3. MANUAL TRIGGER: Emergency releases or testing via workflow_dispatch
#
# Path Exclusions (workflow will NOT run if only these paths change):
# - .github/workflows/ci.yml : CI workflow changes don't require deployment
#
# ====================================================================
# WORKFLOW ARCHITECTURE
# ====================================================================
#
# Runner Environment:
# - OS: Ubuntu Latest (GitHub-hosted)
# - Container: Custom build agent (ghcr.io/the-running-dev/build-agent:latest)
# - Runtime: Node.js with pnpm for Docusaurus 3.8.1
#
# Docusaurus Build Process:
# 1. Full repository checkout with complete git history
# 2. Install dependencies and run repository quality checks
# 3. Generate derived data and build the production Docusaurus site
# 4. Invoke the build-agent's internal `build docker` command to build/publish the docs-template container image
# 5. Upload the Pages artifact from `artifacts/`
# 6. Deploy the built site to GitHub Pages
#
# Project-Specific Details:
# - Docusaurus 3.x documentation site with TypeScript
# - React 19 with modern TypeScript support
# - FontAwesome integration for badge components
# - YAML-to-JSON pre-build pipeline for documentation data
# - docs-template container image published through the build agent
#
# ====================================================================
# PERMISSIONS & SECURITY
# ====================================================================
#
# Required Permissions:
# - contents:read  : Read repository content for build
# - pages:write    : Deploy content to GitHub Pages
# - id-token:write : Verify deployment authenticity
#
# Security Features:
# - Minimal required permissions (principle of least privilege)
# - Container isolation for Docusaurus build process
# - Secure GitHub Pages deployment with official actions
#
# ====================================================================
# OUTPUTS & ARTIFACTS
# ====================================================================
#
# This workflow produces:
# - Build Artifacts: Complete built Docusaurus site (downloadable)
# - GitHub Pages Deployment: Live documentation site
# - Container Image Publication: docs-template image published to GHCR
# - Processed configuration data in `artifacts/`
#
# Docusaurus Build Artifacts:
# - Optimized JavaScript bundles with code splitting
# - Minified CSS with Docusaurus theming
# - Static assets (images, fonts, documentation files)
# - MDX processed content with React component support
# - Search index for documentation search functionality
#
# ====================================================================
# - ESLint, TypeScript, and script validation through `pnpm run quality-ci`
# - Artifacts output: `artifacts/`
# - Docker image build/publish delegated to the shared build agent
#
# ====================================================================
# PERMISSIONS & SECURITY
# ====================================================================
#
# Required Permissions:
# - packages:write : Publish Docker images to GitHub Container Registry
# - contents:write : Create GitHub releases and tags
#
# Required Secrets:
# - GITHUB_TOKEN / REGISTRY_TOKEN : Token with package write permissions for GHCR publication
#
# Security Features:
# - Minimal required permissions (principle of least privilege)
# - Secure secret management through GitHub Secrets
# - Container isolation for the documentation build process
# - Token scoping to GitHub Pages and GHCR publication
#
# Note: The custom build container provides the `build docker` command used to
# publish the docs-template image without a second checkout or separate Docker job.
#
# ====================================================================
# VERSIONING STRATEGY
# ====================================================================
#
# Image and site publication run from the main branch release workflow.
# Image versioning/tagging is handled internally by the build agent.
#
# ====================================================================
# OUTPUTS & ARTIFACTS
# ====================================================================
#
# This workflow produces:
# - Docker Image: ghcr.io/the-running-dev/docs-template:version
# - Registry Tags: managed internally by the build agent
# - GitHub Pages deployment for the static documentation site
# - One release path for both site and container outputs
#
# Static Site Outputs:
# - Optimized JavaScript bundles with code splitting
# - Minified CSS with Docusaurus theming
# - Static assets (images, fonts, documentation files)
# - GitHub Pages-ready output in `artifacts/`
#
# ====================================================================
name: Release

# ====================================================================
# WORKFLOW TRIGGERS
# ====================================================================
on:
  # Manual trigger for emergency releases or testing
  # Usage: Go to Actions tab > Release workflow > Run workflow
  workflow_dispatch:

  # Validate the full release build before merge so build failures block PRs.
  pull_request:
    branches:
      - main

  # Automatic trigger on main branch push (production deployment)
  push:
    branches:
      - main
    # Skip deployment if only CI workflow files changed
    paths-ignore:
      - ".github/workflows/ci.yml"

# ====================================================================
# SECURITY PERMISSIONS
# ====================================================================
# Minimal required permissions following principle of least privilege
permissions:
  contents: read # Required to read repository content
  pages: write # Required to deploy content to GitHub Pages
  id-token: write # Required to verify deployment authenticity
  packages: write # Required to publish Docker images to GitHub Container Registry

# ====================================================================
# JOBS CONFIGURATION
# ====================================================================
jobs:
  # Build Job: Compiles Docusaurus documentation into static assets
  # Uses custom build agent with pre-installed Node.js and build tools
  build:
    name: Build Documentation
    runs-on: ubuntu-latest

    # Use custom build agent container for consistent build environment
    # This container includes Node.js, pnpm, and documentation build tools
    container:
      image: ghcr.io/the-running-dev/build-agent:latest

    steps:
      # ================================================================
      # STEP 1: REPOSITORY CHECKOUT
      # ================================================================
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch complete git history for proper README processing
          fetch-depth: 0

      # ================================================================
      # STEP 2: INSTALL DEPENDENCIES
      # ================================================================
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      # ================================================================
      # STEP 3: CODE CHECK
      # ================================================================
      - name: Check Code Formatting
        run: pnpm run quality-ci

      # ================================================================
      # STEP 4: BUILD DOCUSAURUS SITE
      # ================================================================
      - name: Build Docusaurus Site
        run: pnpm run build:prod
        env:
          # Ensure proper environment for build
          NODE_ENV: production

      # ================================================================
      # STEP 5: BUILD CONTAINER
      # ================================================================
      - name: Build Container
        if: github.event_name != 'pull_request'
        run: build docker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          RegistryToken: ${{ secrets.REGISTRY_TOKEN }}
          NotificationsWebHookUrl: ${{ secrets.NOTIFICATIONS_WEBHOOK_URL }}

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Container to GitHub Registry
        if: github.event_name != 'pull_request'
        run: docker push ghcr.io/the-running-dev/docs-template:latest

      # ================================================================
      # STEP 6: UPLOAD PAGES ARTIFACT
      # ================================================================
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/

  # Deploy Job: Deploys built documentation to GitHub Pages
  # This job depends on successful completion of the Build job
  deploy:
    name: Deploy to GitHub Pages
    needs: build # Wait for Build job to complete successfully
    if: github.event_name != 'pull_request'

    # Enhanced permissions specifically for GitHub Pages deployment
    # These permissions are more restrictive than the workflow-level permissions
    permissions:
      pages: write # Required to deploy content to GitHub Pages
      id-token: write # Required to verify deployment authenticity and source

    # Configure deployment environment for GitHub Pages
    # This provides deployment URL and environment tracking
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      # ============================================================
      # STEP 1: DEPLOY TO GITHUB PAGES
      # ============================================================
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# ====================================================================
# TROUBLESHOOTING GUIDE
# ====================================================================
#
# Common Issues and Solutions:
#
# 1. Docusaurus Build Failures:
#    - Check docusaurus.config.ts for syntax errors
#    - Verify MDX files in docs/ directory are valid
#    - Review sidebar configuration in sidebars.ts
#    - Ensure all image references in static/img/ exist
#
# 2. TypeScript Compilation Errors:
#    - Check syntax errors in React components (.tsx files)
#    - Verify import statements and module dependencies
#    - Ensure React 19 and TypeScript compatibility
#    - Review tsconfig.json configuration
#
# 3. Dependency Issues:
#    - Check pnpm-lock.yaml exists and is not corrupted
#    - Verify package.json dependencies are compatible
#    - Review FontAwesome and React version conflicts
#    - Ensure Node.js version compatibility (18+)
#    - Check pnpm version compatibility with project
#
# 4. Component Build Failures:
#    - Review GitHubProjectBadges component implementation
#    - Check badge-config.json syntax and structure
#    - Verify FontAwesome icon imports are correct
#    - Ensure template variable replacement logic works
#
# 5. Script Execution Issues:
#    - Verify pre-build data generation in scripts/pre-build.ts
#    - Ensure the build-agent image exposes the expected `build docker` command in GitHub Actions
#
# 6. GitHub Pages Deployment Failures:
#    - Ensure repository has Pages enabled in settings
#    - Verify workflow permissions include pages:write
#    - Check build output directory contains index.html
#    - Review GitHub Pages source configuration
#
# 7. Artifact Upload Issues:
#    - Ensure artifacts/ exists after Docusaurus build
#    - Check artifact retention settings (30 days default)
#    - Verify artifact naming conventions
#    - Review upload-artifact action version compatibility

# 8. Container Publication Issues:
#    - Verify workflow permissions include packages:write
#    - Ensure GITHUB_TOKEN/REGISTRY_TOKEN is available to the build job
#    - Confirm the build-agent image supports `build docker` in the GitHub Actions job environment
#
# ====================================================================
# MONITORING & MAINTENANCE
# ====================================================================
#
# Regular Maintenance Tasks:
# - Update GitHub Actions versions (actions/checkout, upload-pages-artifact, deploy-pages)
# - Monitor build container updates for Node.js/pnpm compatibility
# - Review GitHub Pages storage usage and limits
# - Verify artifact retention policies and cleanup
#
# Docusaurus-Specific Maintenance:
# - Monitor Docusaurus framework updates and compatibility
# - Review React 19 and TypeScript library compatibility
# - Update FontAwesome and badge component dependencies
# - Validate MDX content processing and component rendering
# - Monitor production bundle sizes and optimization opportunities
# - Test GitHub Pages deployment with custom domain (if configured)
# - Revalidate build-agent-driven image publication when the build-agent image changes
#
# Monitoring Points:
# - GitHub Actions workflow run status and timing
# - GitHub Pages deployment success and site availability
# - Build artifact sizes and upload success rates
# - Documentation build performance and bundle optimization
# - Container publication success for ghcr.io/the-running-dev/docs-template
# - Data/config generation success during pre-build
#
# ====================================================================
